<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Paila ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Comic Sans MS', cursive;
    text-align:center;
    background:linear-gradient(135deg,#ffd6e0,#fff0f5);
}

h1{
    margin-top:90px;
    font-size:4rem;
    color:#ff4d88;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

p{
    margin-top:20px;
    color:#555;
    font-size:1.3rem;
}

button{
    padding:16px 32px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

#accept{
    position:absolute;
    left:38%;
    top:360px;
    background:#4CAF50;
    color:white;
    transition:transform .25s ease;
}

#deny{
    position:absolute;
    left:56%;
    top:360px;
    background:#ff4d4d;
    color:white;
}

#popup{
    position:fixed;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:15px 25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    opacity:0;
    transition:.3s;
    z-index:1000;
    font-size:20px;
}

.counter{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.heart{
    position:absolute;
    font-size:24px;
    animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }

    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

.success-screen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.success-screen img{
    width:320px;
    border-radius:20px;
}

.success-screen h1{
    margin-top:20px;
}

.success-screen p{
    max-width:700px;
    line-height:1.6;
}

#secretBtn{
    margin-top:20px;
    background:#ff4d88;
    color:white;
}

@media(max-width:768px){

    h1{
        font-size:2.5rem;
        margin-top:80px;
    }

    p{
        padding:0 20px;
    }

    #accept{
        left:20%;
        top:340px;
    }

    #deny{
        left:55%;
        top:340px;
    }
}

</style>
</head>

<body>

<div id="popup"></div>

<h1>Sorry Paila 😔💖</h1>

<p>
I didn't mean to hurt you.<br>
Can you forgive me? 🥺
</p>

<button id="accept">
Yes, I forgive you 💕
</button>

<button id="deny">
No 😡
</button>

<div class="counter">
Attempts to press No:
<span id="attemptCount">0</span>
</div>

<canvas id="fireworks"></canvas>

<audio id="bgMusic">
    <source src="music/until-i-found-you.mp3" type="audio/mpeg">
</audio>

<script>

const yesBtn = document.getElementById("accept");
const denyBtn = document.getElementById("deny");
const popup = document.getElementById("popup");
const counter = document.getElementById("attemptCount");

let attempts = 0;

const messages = [

"🥺 Please?",
"😭 Wait wait wait...",
"💖 Hear me out...",
"😔 That was almost a No.",
"🥹 You're surprisingly good at this.",
"💘 The Yes button is getting excited.",
"😩 Why are you so determined?",
"🚨 Paila has entered competitive mode.",
"💔 My apology is fighting for its life.",
"😭 Fine, I'll make the Yes button bigger.",
"🫠 This is getting embarrassing.",
"🥹 Just click Yes already.",
"💖 We both know where this ends.",
"😤 Stop chasing the No button.",
"🎯 Impressive accuracy.",
"🚨 The No button is requesting backup.",
"😭 Backup denied.",
"💘 The Yes button believes in destiny.",
"🥹 Last chance to be nice.",
"😤 Are you training for this?",
"🏃 The No button is tired.",
"💀 Okay this is personal now.",
"😭 Please have mercy.",
"💖 The Yes button is waiting.",
"🥹 I believe in you.",
"🚨 Emotional damage detected.",
"😩 This apology is working overtime.",
"💘 One click solves everything.",
"😭 Final warning.",
"🚨 The No button has resigned."
];

function showPopup(text){

    popup.innerText = text;

    popup.style.opacity = 1;

    clearTimeout(window.popupTimer);

    window.popupTimer = setTimeout(()=>{

        popup.style.opacity = 0;

    },2500);
}
denyBtn.addEventListener("mouseenter",()=>{

    attempts++;

    counter.innerText = attempts;

    denyBtn.style.left =
        Math.random() *
        (window.innerWidth - 180) + "px";

    denyBtn.style.top =
        Math.random() *
        (window.innerHeight - 120) + "px";

    yesBtn.style.transform =
        `scale(${1 + attempts * 0.18})`;

    showPopup(
        messages[
            Math.min(
                attempts - 1,
                messages.length - 1
            )
        ]
    );

    if(attempts === 5){
        denyBtn.innerText = "Maybe 🤔";
    }

    if(attempts === 10){
        denyBtn.innerText = "Fine 😭";
    }

    if(attempts === 15){
        denyBtn.innerText = "Think Again 😏";
    }

    if(attempts === 20){
        denyBtn.innerText = "Forgive Him ❤️";
    }

    if(attempts === 25){
        denyBtn.innerText =
        "You Know You Want To";
    }

    if(attempts >= 30){

        denyBtn.style.display = "none";

        showPopup(
        "🚨 The No button has officially resigned."
        );
    }

});

function createHeart(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "💖";

    heart.style.left =
    Math.random() *
    window.innerWidth + "px";

    heart.style.top =
    window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },5000);
}

setInterval(createHeart,400);

const canvas =
document.getElementById("fireworks");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

let particles = [];

function createFirework(){

    const x =
    Math.random() *
    canvas.width;

    const y =
    Math.random() *
    canvas.height * 0.7;

    for(let i=0;i<100;i++){

        particles.push({

            x:x,

            y:y,

            dx:
            (Math.random()-0.5)*8,

            dy:
            (Math.random()-0.5)*8,

            life:80
        });
    }
}

function animateFireworks(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach((p,index)=>{

        p.x += p.dx;
        p.y += p.dy;

        p.life--;

        ctx.fillStyle =
        "gold";

        ctx.fillRect(
            p.x,
            p.y,
            4,
            4
        );

        if(p.life <= 0){

            particles.splice(index,1);
        }

    });

    requestAnimationFrame(
        animateFireworks
    );
}

animateFireworks();

function startFireworks(){

    setInterval(()=>{

        createFirework();

    },500);
}
yesBtn.onclick = ()=>{

    const music =
document.getElementById("bgMusic");

music.play();

// keep playing even after page changes
window.savedMusic = music;

    startFireworks();

    setTimeout(()=>{

        document.body.innerHTML = `
        <audio id="bgMusic" autoplay loop>
        <source src="music/until-i-found-you.mp3" type="audio/mpeg">
        </audio>


        <div class="success-screen">

            <img
            src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
            alt="Happy Cat">

            <h1>
            🎉 YAYYYYYY 🎉
            </h1>

            <h2>
            ❤️ Paila Forgave Me ❤️
            </h2>

            <h3>
            Achievement Unlocked:
            Soft Heart Detected 💖
            </h3>

            <p>

            Thank you for giving me another chance.

            I know saying sorry doesn't magically fix everything.

            But I hope you know hurting you was never my intention.

            My days are always better when you're in them.

            Whether we're laughing,
            talking,
            arguing,
            or doing absolutely nothing.

            Thank you for staying.

            ❤️

            </p>

            <button id="secretBtn">
            💌 Open Secret Message
            </button>

        </div>

        `;

        document
        .getElementById("secretBtn")
        .onclick = ()=>{

            alert(

`Dear Paila ❤️

You caught the No button.

You survived the emotional manipulation.

You ignored several professional apologies.

So I guess there's only one thing left to say:

I'm sorry.

Not because this page told me to be.

Not because I got caught.

Because you matter to me.

Thank you for giving me another chance.

Now please stop being angry at me.

❤️`

            );

        };

    },1200);

};

window.addEventListener("resize",()=>{

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

});

</script>

</body>
</html>
