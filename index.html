<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Paila ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Comic Sans MS', cursive;
    background:linear-gradient(135deg,#ffd6e0,#fff0f5);
    text-align:center;
}

h1{
    margin-top:120px;
    font-size:3.5rem;
    color:#ff4d88;
}

p{
    color:#555;
    font-size:1.3rem;
}

button{
    border:none;
    border-radius:30px;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

#accept{
    background:#4CAF50;
    color:white;
    position:absolute;
    left:40%;
    top:350px;
}

#deny{
    background:#ff4d4d;
    color:white;
    position:absolute;
    left:55%;
    top:350px;
}

.heart{
    position:absolute;
    animation:floatUp 5s linear forwards;
    font-size:24px;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

#popup{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:15px 25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    opacity:0;
    transition:.3s;
    z-index:999;
    font-size:20px;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

.success-screen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.success-screen h1{
    margin:10px;
}

.success-screen p{
    max-width:700px;
}
</style>
</head>

<body>

<div id="popup"></div>

<h1 id="message">Sorry Paila 😔💖</h1>

<p>
I didn't mean to hurt you.<br>
Can you forgive me? 🥺
</p>

<button id="accept">Yes, I forgive you 💕</button>
<button id="deny">No 😡</button>

<canvas id="fireworks"></canvas>

<script>

const denyBtn = document.getElementById("deny");
const yesBtn = document.getElementById("accept");
const popup = document.getElementById("popup");

let attempts = 0;

const messages = [
"🥺 Please?",
"😭 I practiced this apology all day.",
"💖 Come on Paila...",
"😔 The No button is scared.",
"💕 Pretty please?",
"🥹 Just one chance.",
"💘 The Yes button believes in us.",
"😭 You're making this difficult.",
"🌸 Forgiveness looks amazing on you.",
"💖 Pailaaaa pleaseee.",
"😩 I am running out of apology moves.",
"🚨 The No button is considering retirement.",
"🥹 Look how big the Yes button is getting.",
"💔 Even my backup apology failed.",
"😭 Fine... I tried."
];

function showPopup(text){
    popup.innerText = text;
    popup.style.opacity = 1;

    setTimeout(()=>{
        popup.style.opacity = 0;
    },1500);
}

document.addEventListener("mousemove",(e)=>{

    if(denyBtn.style.display === "none") return;

    const rect = denyBtn.getBoundingClientRect();

    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    const triggerDistance = Math.max(
        150 - attempts * 5,
        50
    );

    if(distance < triggerDistance){

        attempts++;

        denyBtn.style.left =
            Math.random() * (window.innerWidth - 120) + "px";

        denyBtn.style.top =
            Math.random() * (window.innerHeight - 80) + "px";

        yesBtn.style.transform =
            `scale(${1 + attempts * 0.05})`;

        showPopup(
            messages[
                Math.min(attempts-1,messages.length-1)
            ]
        );

        if(attempts === 5){
            denyBtn.innerText = "Maybe 🤔";
        }

        if(attempts === 10){
            denyBtn.innerText = "Fine 😭";
        }

        if(attempts === 15){
            denyBtn.style.display = "none";
            showPopup("🚨 The No button has resigned.");
        }
    }
});

function createHeart(){

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left =
        Math.random() * window.innerWidth + "px";

    heart.style.top =
        window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,400);

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(){

    const x =
        Math.random() * canvas.width;

    const y =
        Math.random() * canvas.height * 0.6;

    for(let i=0;i<80;i++){

        particles.push({
            x:x,
            y:y,
            dx:(Math.random()-0.5)*8,
            dy:(Math.random()-0.5)*8,
            life:80
        });
    }
}

function animateFireworks(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach((p,index)=>{

        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.fillStyle = "gold";
        ctx.fillRect(
            p.x,
            p.y,
            4,
            4
        );

        if(p.life <= 0){
            particles.splice(index,1);
        }
    });

    requestAnimationFrame(
        animateFireworks
    );
}

animateFireworks();

function startFireworks(){

    setInterval(()=>{
        createFirework();
    },500);
}

yesBtn.onclick = () => {

    startFireworks();

    setTimeout(()=>{

        document.body.innerHTML = `

        <div class="success-screen">

            <img
            src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
            style="
            width:300px;
            border-radius:20px;
            ">

            <h1>
            🎉 YAYYYYYY 🎉
            </h1>

            <h2>
            ❤️ Paila Forgave Me ❤️
            </h2>

            <h3>
            Achievement Unlocked:
            Soft Heart Detected 💖
            </h3>

            <p>
            Thank you for forgiving me.
            I know I mess up sometimes,
            but you mean a lot to me.
            I never want to stop trying
            to make you smile.
            </p>

            <button
            id="secretBtn"
            style="
            background:#ff4d88;
            color:white;
            ">
            💌 Open Secret Message
            </button>

        </div>
        `;

        document
        .getElementById("secretBtn")
        .onclick = ()=>{

            alert(
`Dear Paila ❤️

Thank you for giving me another chance.

You are genuinely one of the most special people in my life and I never want a mistake to make you forget how much I care about you.

Now please stop being angry at me 😭💖`
            );
        };

    },1200);
};

</script>

</body>
</html>
