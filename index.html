<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Paila ❤️</title>

<style>
  body {
    margin: 0;
    font-family: "Comic Sans MS", cursive;
    text-align: center;
    background: linear-gradient(to right, #ffd6e0, #fff0f5);
    overflow: hidden;
  }

  h1 {
    margin-top: 120px;
    font-size: 3.5rem;
    color: #ff4d88;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  p {
    font-size: 1.2rem;
    color: #555;
  }

  .buttons {
    margin-top: 60px;
  }

  button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    position: absolute;
    transition: 0.3s;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  }

  #accept {
    background-color: #4CAF50;
    color: white;
    left: 40%;
  }

  #deny {
    background-color: #ff4d4d;
    color: white;
    left: 55%;
  }

  /* Floating hearts */
  .heart {
    position: absolute;
    font-size: 20px;
    color: red;
    animation: floatUp 5s linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-800px); opacity:0; }
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<h1 id="message">Sorry Paila 😔💖</h1>
<p>I didn’t mean to hurt you... please forgive me 🥺</p>

<div class="buttons">
  <button id="accept">Yes, I forgive you 💕</button>
  <button id="deny">No 😡</button>
</div>

<canvas id="fireworks"></canvas>

<script>
  const denyBtn = document.getElementById("deny");

  // Deny button escapes cursor
  document.addEventListener("mousemove", (e) => {
    const rect = denyBtn.getBoundingClientRect();
    const dx = e.clientX - rect.left;
    const dy = e.clientY - rect.top;

    if (Math.abs(dx) < 120 && Math.abs(dy) < 120) {
      denyBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
      denyBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
    }
  });

  // Floating hearts animation
  function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.classList.add("heart");

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }

  setInterval(createHeart, 400);

  // Fireworks
  const canvas = document.getElementById("fireworks");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  function createFirework() {
    for (let i = 0; i < 100; i++) {
      particles.push({
        x: canvas.width / 2,
        y: canvas.height / 2,
        dx: (Math.random() - 0.5) * 7,
        dy: (Math.random() - 0.5) * 7,
        life: 100,
      });
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
      p.x += p.dx;
      p.y += p.dy;
      p.life--;

      ctx.fillStyle = "gold";
      ctx.fillRect(p.x, p.y, 3, 3);

      if (p.life <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(animate);
  }

  function startFireworks() {
    setInterval(createFirework, 600);
    animate();
  }

  // Accept action
  document.getElementById("accept").onclick = () => {
    document.getElementById("message").innerText =
      "Yayy Paila! 🎉💖 Thank youuu!!";

    startFireworks();
  };
</script>

</body>
</html>
